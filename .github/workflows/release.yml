name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify version consistency
        run: scripts/check-version.sh "${{ github.ref_name }}"

      - name: Download JAR from build workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in $(seq 1 15); do
            run_id=$(gh run list \
              --workflow build-gradle-project.yml \
              --commit "${{ github.sha }}" \
              --status success \
              --json databaseId \
              --jq '.[0].databaseId')
            if [ -n "$run_id" ]; then
              echo "Found successful build run: $run_id"
              gh run download "$run_id" --name animate.jar
              exit 0
            fi
            echo "Attempt $attempt/15: waiting for build to complete..."
            sleep 30
          done
          echo "ERROR: No successful build found for commit ${{ github.sha }} after 15 attempts"
          exit 1

      - name: Rename JAR
        run: mv animate-*.jar animate.jar

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} animate.jar --generate-notes
