name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Verify version consistency
        run: scripts/check-version.sh "${{ github.ref_name }}"

      - name: Download JAR from build workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in $(seq 1 15); do
            run_id=$(gh run list \
              --workflow build-gradle-project.yml \
              --commit "${{ github.sha }}" \
              --status success \
              --json databaseId \
              --jq '.[0].databaseId')

            if [ -n "$run_id" ]; then
              echo "Found successful Build and Test run: $run_id"
              gh run download "$run_id" --name eventb-animate.jar
              exit 0
            fi

            echo "Attempt $attempt/15: no successful Build and Test run found yet..."
            sleep 30
          done

          echo "::error::No successful Build and Test run found for commit ${{ github.sha }}."
          echo "::error::Push the branch and wait for Build and Test to pass before pushing the release tag."
          echo "::error::Then rerun this Release workflow or push the release tag."
          exit 1

      - name: Rename JAR
        run: mv eventb-animate-*.jar eventb-animate.jar

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} eventb-animate.jar --notes-file RELEASE_NOTES.md --title "Event-B Animate ${{ github.ref_name }}"
