name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify version consistency
        run: scripts/check-version.sh "${{ github.ref_name }}"

      - name: Download JAR from build workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh run list \
            --workflow build-gradle-project.yml \
            --commit "${{ github.sha }}" \
            --status success \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$run_id" ]; then
            echo "ERROR: No successful Build and Test run found for commit ${{ github.sha }}"
            exit 1
          fi
          gh run download "$run_id" --name animate.jar

      - name: Rename JAR
        run: mv animate-*.jar animate.jar

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} animate.jar --generate-notes
