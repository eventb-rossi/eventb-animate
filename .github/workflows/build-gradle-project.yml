name: Build and Test

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project sources
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Check formatting
      run: ./gradlew spotlessCheck --no-daemon

    - name: Static analysis
      run: ./gradlew spotbugsMain --no-daemon

    - name: Build and Test
      run: ./gradlew build --no-daemon

    - name: Verify jar version
      run: |
        expected=$(sed -n "s/^version = '\([^']*\)'$/\1/p" build.gradle)
        actual=$(java -jar build/libs/eventb-animate-*.jar --version)
        test "$actual" = "eventb-animate $expected"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: build/test-results/test/*.xml

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports
        path: build/reports/tests/test/

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: eventb-animate.jar
        path: build/libs/eventb-animate-*.jar
