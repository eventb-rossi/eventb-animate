.eventb-animate:
  image: eclipse-temurin:21-jdk
  variables:
    EVENTB_ANIMATE_MODEL_PATH: ''
    EVENTB_ANIMATE_COMMAND: 'animate'
    EVENTB_ANIMATE_STEPS: ''
    EVENTB_ANIMATE_SIZE: ''
    EVENTB_ANIMATE_INVARIANTS: 'false'
    EVENTB_ANIMATE_SAVE: ''
    EVENTB_ANIMATE_TRACE: ''
    EVENTB_ANIMATE_ARGS: ''
    EVENTB_ANIMATE_VERSION: 'latest'
  before_script:
    - |
      if [ "$EVENTB_ANIMATE_VERSION" = "latest" ]; then
        url="https://github.com/eventb-rossi/eventb-animate/releases/latest/download/eventb-animate.jar"
      else
        url="https://github.com/eventb-rossi/eventb-animate/releases/download/${EVENTB_ANIMATE_VERSION}/eventb-animate.jar"
      fi
      curl -sL --fail -o /tmp/eventb-animate.jar "$url"
  script:
    - |
      if [ -z "$EVENTB_ANIMATE_MODEL_PATH" ]; then
        echo "ERROR: EVENTB_ANIMATE_MODEL_PATH is required but not set" >&2
        exit 1
      fi

      cli_args=()

      if [ "$EVENTB_ANIMATE_COMMAND" = "replay" ]; then
        cli_args+=("replay")
        if [ -z "$EVENTB_ANIMATE_TRACE" ]; then
          echo "ERROR: EVENTB_ANIMATE_TRACE is required when EVENTB_ANIMATE_COMMAND is 'replay'" >&2
          exit 1
        fi
        cli_args+=("-t" "$EVENTB_ANIMATE_TRACE")
        if [ -n "$EVENTB_ANIMATE_STEPS" ] || [ -n "$EVENTB_ANIMATE_SIZE" ] || [ "$EVENTB_ANIMATE_INVARIANTS" = "true" ] || [ -n "$EVENTB_ANIMATE_SAVE" ]; then
          echo "WARNING: EVENTB_ANIMATE_STEPS, EVENTB_ANIMATE_SIZE, EVENTB_ANIMATE_INVARIANTS, and EVENTB_ANIMATE_SAVE are ignored when EVENTB_ANIMATE_COMMAND is 'replay'" >&2
        fi
      elif [ "$EVENTB_ANIMATE_COMMAND" = "animate" ]; then
        if [ -n "$EVENTB_ANIMATE_STEPS" ]; then
          if ! [[ "$EVENTB_ANIMATE_STEPS" =~ ^[0-9]+$ ]]; then
            echo "ERROR: EVENTB_ANIMATE_STEPS must be a positive integer, got '$EVENTB_ANIMATE_STEPS'" >&2
            exit 1
          fi
          cli_args+=("--steps" "$EVENTB_ANIMATE_STEPS")
        fi
        if [ -n "$EVENTB_ANIMATE_SIZE" ]; then
          if ! [[ "$EVENTB_ANIMATE_SIZE" =~ ^[0-9]+$ ]]; then
            echo "ERROR: EVENTB_ANIMATE_SIZE must be a positive integer, got '$EVENTB_ANIMATE_SIZE'" >&2
            exit 1
          fi
          cli_args+=("--size" "$EVENTB_ANIMATE_SIZE")
        fi
        if [ "$EVENTB_ANIMATE_INVARIANTS" = "true" ]; then
          cli_args+=("--invariants")
        fi
        if [ -n "$EVENTB_ANIMATE_SAVE" ]; then
          cli_args+=("--save" "$EVENTB_ANIMATE_SAVE")
        fi
      else
        echo "ERROR: Unknown EVENTB_ANIMATE_COMMAND '$EVENTB_ANIMATE_COMMAND'. Must be 'animate' or 'replay'." >&2
        exit 1
      fi

      if [ -n "$EVENTB_ANIMATE_ARGS" ]; then
        # shellcheck disable=SC2086
        cli_args+=($EVENTB_ANIMATE_ARGS)
      fi

      cli_args+=("$EVENTB_ANIMATE_MODEL_PATH")

      java -jar /tmp/eventb-animate.jar "${cli_args[@]}"
